<html>
    <textarea cols="100" rows="36">
        <!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title> Przykład użycia pętli </title>
    <script language="JavaScript">
        do {
            l1_t_kac = parseFloat(prompt("podaj liczbe z zakresu <20;60>",""));
            l2_t_kac = parseFloat(prompt("podaj liczbe z zakresu <20;60>",""));
        } while (60 < l1_t_kac || l1_t_kac < 20 || (60 < l2_t_kac || l2_t_kac < 20));

        pocz_kac = parseInt(prompt("Podaj wartość początkową wielkości tekstu",""));
        tekst_kac = prompt("podaj dowolny tekst","");

        if (l1_t_kac < l2_t_kac){
            for (var i=pocz_kac; i<=100; i+=5){
                document.write("<p style=\"font-size:"+i+"px; color: black;\"><br>"+tekst_kac+"<br></p>");
            }
        } else if (l2_t_kac < l1_t_kac){
            for (var i=pocz_kac; i>=0; i-=5){
                document.write("<p style=\"font-size:"+i+"px; color: black;\"><br>"+tekst_kac+"<br></p>");;
            }
        } else if (l2_t_kac == l1_t_kac) {
            document.write("<p style=\"font-size:"+i+"px; color: black;\"><br>"+tekst_kac+"<br></p>");
        }

        document.write("<p style=\"font-size:"+i+"px; color: black;\"><br>"+tekst_kac+"<br></p>");
    </script>
</head>
<body>
</body>
</html>
    </textarea>
</html>
