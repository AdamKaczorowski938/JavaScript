
<html>
<head>
    <meta charset="UTF-8">
    <title>Kaczorowski z50js</title>
</head>
<body>
    <div style="color:red;font-size:50px;">
        <script>
            suma_kacz=0;
            for(i_k=1;i_k<=1000000;i_k++)
            {
                suma_kacz=suma_kacz+1/i_k;
            }
            document.write("suma= "+ suma_kacz.toFixed(2)+ "<br>");
        </script>
    </div>
</body>
</html>
