<div style="color:red;font-size:50px;">
 <script language="JavaScript">
var x=prompt("podaj liczbę x=","");
 var a_dana_kac=parseFloat(x);
//zmien zmienną „a” na a_dana_kow
 document.write("czytana liczba x="+a_dana_kac+"<br>");
 if(a_dana_kac>0)
 {document.write("czytana liczba jest większa od 0"+"<br>");}
 else if(a_dana_kac==0)
 {document.write("Liczba jest równa 0"+"<br>");}
 else if(a_dana_kac<0)
 {document.write("liczba jest mniejsza od 0"+"<br>");}
// Dokończ dwa pozostałe przypadki a==0 i a<0
 </script>
