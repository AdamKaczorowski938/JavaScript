<html>
    <textarea cols="60" rows="35">
        <!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title> Przykład użycia pętli </title>
    <script language="JavaScript">
        var a_kac = parseFloat(prompt("podaj długość boku a"));
        var b_kac = parseFloat(prompt("podaj dlugośc boku b"));

        for (var j_kac = 1; j_kac <= b_kac; j_kac++) {
            document.write("*");
        }
        document.write("<br>");

        var wiersz_kac = "*";
        for (var j_kac = 1; j_kac <= (b_kac - 2); j_kac++) {
            wiersz_kac = wiersz_kac + "&nbsp;&nbsp;";
        }
        wiersz_kac = wiersz_kac + "*";

        for (var i_kac = 1; i_kac <= (a_kac - 2); i_kac++) {
            document.write(wiersz_kac + "<br>");
        }

        for (var j_kac = 1; j_kac <= b_kac; j_kac++) {
            document.write("*");
        }
        document.write("<br>");
    </script>
</head>
<body>
</body>
</html>
    </textarea>
</html>
