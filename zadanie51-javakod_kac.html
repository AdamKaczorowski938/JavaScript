<html>
    <textarea rows="20" cols="60">
        <!DOCTYPE html>
<head>
    <title>Kaczorowski Z51_JS</title>
    <meta charset="utf-8">
</head>
<body>
    <div style="color:red;font-size:50px;">
        <script language="JavaScript">
            var silnia_kac = 1;
            var n_kac = parseInt(prompt("n = ",""));
            for (var i_kac = 1; i_kac<=n_kac; i_kac++){
                silnia_kac*=i_kac;
            }
            document.write(n_kac + "! = " + silnia_kac.toFixed(0));
        </script>
    </div>
</body>
</html>
    </textarea>
</html>
