<html>
    <textarea cols="90" rows="30">
        <html>

<head>
    <title>Kazczorowski Z48 js </title>
    <meta charset="utf-8">
</head>

<body>
    <div style="color:red;font-size:50px;">
        <script language="JavaScript">
            do {
                var liczba1 = prompt("wysokość=", "");
                var h_kac = parseFloat(liczba1);
            }
            while (h_kac <= 0);
            do {
                var liczba1 = prompt("podstawę=", "");
                var a_kac = parseFloat(liczba1);
            }
            while (!(a_kac > 0));
            var Pole = a_kac * h_kac / 2;
            document.write("Pole=" + Pole.toFixed(2) + " cm^2" + "<br>");
        </script>
    </div>
</body>

</html>
    </textarea>
</html>
